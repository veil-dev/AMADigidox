<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Portal — AMA DigiDox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --maroon: #8B0000;
  --maroon2: #a01010;
  --maroon3: #c04040;
  --maroon-light: rgba(139,0,0,0.08);
  --maroon-glow: rgba(139,0,0,0.15);

  --sidebar-w: 240px;
  --header-h: 64px;
  --bottom-nav-h: 64px;

  --surface: #fff;
  --surface2: #f6f4f4;
  --surface3: #f0eced;
  --border: #e8e0e0;
  --border2: #d8cccc;

  --text: #1a1010;
  --text2: #5a4a4a;
  --text3: #9a8888;

  --green: #16a34a;
  --green-bg: #dcfce7;
  --green-text: #15803d;
  --blue: #2563eb;
  --blue-bg: #dbeafe;
  --blue-text: #1d4ed8;
  --red: #dc2626;
  --red-bg: #fee2e2;
  --red-text: #b91c1c;
  --amber: #d97706;
  --amber-bg: #fef3c7;
  --amber-text: #b45309;

  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --transition: 0.18s ease;

  --font: 'Poppins', sans-serif;
  --font-display: 'Poppins', sans-serif;

  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
}

html, body {
  height: 100%; width: 100%;
  font-family: var(--font);
  background: var(--surface3);
  color: var(--text);
  overflow: hidden;
  max-width: 100vw;
}

* { max-width: 100%; }

/* ── Stats Row ── */

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--maroon);
  display: flex;
  flex-direction: column;
  height: 100vh;
  position: relative;
  z-index: 10;
  overflow: hidden;
}

.sidebar::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(160deg, rgba(255,255,255,0.04) 0%, transparent 60%);
  pointer-events: none;
}

.sidebar-brand {
  padding: 20px 20px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.sidebar-logo {
  width: 36px;
  height: 36px;
  object-fit: contain;
  opacity: 0.95;
  filter: brightness(0) invert(1);
}

.sidebar-brand-text h1 {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 800;
  color: #fff;
  line-height: 1;
  letter-spacing: -0.01em;
}

.sidebar-brand-text span {
  font-size: 10px;
  color: rgba(255,255,255,0.55);
  font-weight: 400;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* User card in sidebar */
.sidebar-user {
  padding: 16px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.sidebar-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  border: 1.5px solid rgba(255,255,255,0.3);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  font-weight: 700;
  flex-shrink: 0;
  font-family: var(--font-display);
}

.sidebar-user-info {
  min-width: 0;
}

.sidebar-user-name {
  font-size: 12px;
  font-weight: 600;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.sidebar-user-usn {
  font-size: 10px;
  color: rgba(255,255,255,0.5);
  margin-top: 1px;
}

/* Sidebar Nav */
.sidebar-nav {
  flex: 1;
  padding: 12px 10px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  overflow-y: auto;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  color: rgba(255,255,255,0.65);
  font-size: 13px;
  font-weight: 500;
  transition: var(--transition);
  text-decoration: none;
  border: none;
  background: transparent;
  width: 100%;
  font-family: var(--font);
}

.nav-item:hover {
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.9);
}

.nav-item.active {
  background: rgba(255,255,255,0.18);
  color: #fff;
  font-weight: 600;
}

.nav-icon { font-size: 16px; flex-shrink: 0; }

/* Sidebar footer */
.sidebar-footer {
  padding: 12px 10px;
  border-top: 1px solid rgba(255,255,255,0.1);
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex-shrink: 0;
}

.sidebar-footer .nav-item {
  font-size: 12px;
}

/* ── Main area ── */
.main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  height: 100vh;
  overflow: hidden;
}

/* Top bar */
.topbar {
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 16px;
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
}

.topbar-title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  flex: 1;
}

.topbar-subtitle {
  font-size: 11px;
  color: var(--text3);
  margin-top: 1px;
  font-weight: 400;
}

.topbar-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* Mobile header (hidden on desktop) */
.mobile-header {
  display: none;
  height: 56px;
  background: var(--maroon);
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
}

.mobile-logo { width: 28px; height: 28px; object-fit: contain; filter: brightness(0) invert(1); opacity: 0.9; }
.mobile-brand { font-family: var(--font-display); font-size: 16px; font-weight: 800; color: #fff; flex: 1; }

/* Scrollable content */
.main-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 24px 28px 28px;
}

.app-shell {
  display: flex;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
  max-width: 100vw;
}
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 22px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: var(--shadow-sm);
  transition: var(--transition);
  animation: fadeUp 0.4s ease both;
}

.stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }

.stat-icon-wrap {
  width: 44px;
  height: 44px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.stat-icon-wrap.total { background: #f3f0f0; }
.stat-icon-wrap.uploaded { background: var(--green-bg); }
.stat-icon-wrap.reviewing { background: var(--blue-bg); }
.stat-icon-wrap.missing { background: var(--red-bg); }

.stat-value { font-size: 26px; font-weight: 700; font-family: var(--font-display); line-height: 1; }
.stat-value.total { color: var(--maroon); }
.stat-value.uploaded { color: var(--green); }
.stat-value.reviewing { color: var(--blue); }
.stat-value.missing { color: var(--red); }
.stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 3px; font-weight: 500; }

/* ── Content Grid ── */
.content-grid {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 20px;
  align-items: start;
}

/* ── Card ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  animation: fadeUp 0.4s ease both;
}

.card-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.card-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  font-family: var(--font-display);
}

.card-body { padding: 20px; }
.card-body.no-pad { padding: 0; }

/* ── Progress Bar ── */
.progress-wrap { padding: 16px 20px; }
.progress-meta { display: flex; justify-content: space-between; margin-bottom: 8px; }
.progress-label { font-size: 12px; font-weight: 500; color: var(--text2); }
.progress-pct { font-size: 12px; font-weight: 700; color: var(--maroon); }
.progress-track { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--maroon), var(--maroon3)); border-radius: 4px; transition: width 0.7s cubic-bezier(0.4,0,0.2,1); }

/* ── Filter Tabs ── */
.filter-row {
  display: flex;
  gap: 6px;
  padding: 14px 20px 0;
  flex-wrap: wrap;
}

@media (max-width: 768px) {
  .filter-row {
    gap: 5px;
    padding: 12px 14px 0;
  }
  .filter-btn {
    font-size: 10.5px;
    padding: 5px 11px;
  }
}

.filter-btn {
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  font-family: var(--font);
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  color: var(--text2);
  transition: var(--transition);
  white-space: nowrap;
  flex-shrink: 0;
}

.filter-btn:hover { border-color: var(--maroon); color: var(--maroon); }
.filter-btn.active { background: var(--maroon); border-color: var(--maroon); color: #fff; }

/* ── Doc List ── */
.doc-list { padding: 10px 12px 14px; display: flex; flex-direction: column; gap: 5px; }

.doc-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  background: var(--surface);
  transition: var(--transition);
}

.doc-item:hover { border-color: var(--maroon3); background: #fdf9f9; }

.doc-icon { font-size: 18px; flex-shrink: 0; }
.doc-name { flex: 1; font-size: 12.5px; font-weight: 500; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.doc-badge {
  font-size: 9.5px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: 0.02em;
}

.doc-badge.uploaded { background: var(--green-bg); color: var(--green-text); }
.doc-badge.reviewing { background: var(--blue-bg); color: var(--blue-text); }
.doc-badge.missing { background: var(--red-bg); color: var(--red-text); }
.doc-badge.expired { background: var(--amber-bg); color: var(--amber-text); }

.doc-actions { display: flex; gap: 4px; flex-shrink: 0; }

.mini-btn {
  padding: 4px 9px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface2);
  font-size: 10px;
  cursor: pointer;
  color: var(--text2);
  font-family: var(--font);
  transition: var(--transition);
  white-space: nowrap;
}
.mini-btn:hover { background: var(--maroon); color: #fff; border-color: var(--maroon); }
.mini-btn.danger:hover { background: var(--red); border-color: var(--red); }

/* ── Right Panel ── */
.right-panel { display: flex; flex-direction: column; gap: 16px; }

/* Welcome card */
.welcome-card {
  background: var(--maroon);
  border-radius: var(--radius-lg);
  padding: 20px;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-md);
  animation: fadeUp 0.4s ease both;
}

.welcome-card::before {
  content: '';
  position: absolute;
  top: -30px; right: -30px;
  width: 120px; height: 120px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
}

.welcome-card::after {
  content: '';
  position: absolute;
  bottom: -20px; left: -20px;
  width: 80px; height: 80px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
}

.welcome-avatar {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: rgba(255,255,255,0.18);
  border: 2px solid rgba(255,255,255,0.3);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 12px;
  font-family: var(--font-display);
  position: relative;
  z-index: 1;
}

.welcome-name {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  position: relative; z-index: 1;
  margin-bottom: 3px;
}

.welcome-sub {
  font-size: 10.5px;
  color: rgba(255,255,255,0.6);
  position: relative; z-index: 1;
}

/* Upload CTA */
.upload-cta {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  box-shadow: var(--shadow-sm);
  animation: fadeUp 0.4s ease both;
}

.upload-cta-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}

.upload-cta-desc {
  font-size: 11px;
  color: var(--text3);
  line-height: 1.5;
}

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  border: none;
  text-decoration: none;
}

.btn-primary {
  background: var(--maroon);
  color: #fff;
}
.btn-primary:hover { background: var(--maroon2); box-shadow: 0 2px 8px var(--maroon-glow); }

.btn-outline {
  background: transparent;
  color: #fff;
  border: 1px solid rgba(255,255,255,0.35);
}
.btn-outline:hover { background: rgba(255,255,255,0.12); }

.btn-ghost {
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border);
}
.btn-ghost:hover { border-color: var(--maroon); color: var(--maroon); background: var(--maroon-light); }

.btn-full { width: 100%; justify-content: center; }

/* ── Mobile Bottom Nav ── */
.mobile-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--bottom-nav-h);
  background: var(--surface);
  border-top: 1px solid var(--border);
  z-index: 100;
  box-shadow: 0 -2px 16px rgba(0,0,0,0.06);
}

.mobile-nav-inner {
  display: flex;
  height: 100%;
}

.mobile-nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  cursor: pointer;
  background: transparent;
  border: none;
  font-family: var(--font);
  color: var(--text3);
  transition: var(--transition);
}

.mobile-nav-item.active { color: var(--maroon); }
.mobile-nav-item-icon { font-size: 18px; }
.mobile-nav-item-label { font-size: 9px; font-weight: 600; letter-spacing: 0.03em; text-transform: uppercase; }

/* ── Empty state ── */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text3);
}
.empty-state .es-icon { font-size: 32px; margin-bottom: 10px; }
.empty-state .es-text { font-size: 12px; }

/* ── Loading ── */
.loading-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: var(--text3);
}
.loading-spinner {
  width: 28px; height: 28px;
  border: 2.5px solid var(--border);
  border-top-color: var(--maroon);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 14px;
}

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ── Responsive ── */
@media (max-width: 1100px) {
  .content-grid { grid-template-columns: 1fr; }
  .right-panel { display: grid; grid-template-columns: 1fr 1fr; }
}

@media (max-width: 900px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 768px) {
  .sidebar { display: none; }
  .mobile-header { display: flex; }
  .mobile-nav { display: block; }
  .main-content { padding: 16px 14px calc(var(--bottom-nav-h) + 16px); overflow-x: hidden; }
  .topbar { display: none; }
  .main-area { height: calc(100vh); }
  .stats-row { gap: 10px; }
  .stat-card { padding: 14px 14px; gap: 10px; }
  .stat-icon-wrap { width: 36px; height: 36px; font-size: 16px; }
  .stat-value { font-size: 22px; }
  .right-panel { display: flex; flex-direction: column; }
  .content-grid { gap: 14px; grid-template-columns: 1fr !important; }
  .doc-item { flex-wrap: wrap; }
  .doc-name { min-width: 0; flex-basis: 60%; }
  .doc-actions { flex-wrap: wrap; }
}

@media (max-width: 480px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .stat-card { padding: 12px; gap: 8px; }
  .stat-value { font-size: 20px; }
  .stat-label { font-size: 9px; }
  .main-content { padding: 12px 12px calc(var(--bottom-nav-h) + 12px); }
  .doc-item { gap: 8px; padding: 9px 10px; }
  .doc-name { font-size: 11.5px; }
}

.overview-grid { grid-template-columns: 1fr 1fr !important; }

@media (max-width: 768px) {
  .overview-grid { grid-template-columns: 1fr !important; }
}

/* ── Mobile Welcome Banner ── */
.mobile-welcome-banner {
  display: none;
  background: var(--maroon);
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  margin-bottom: 16px;
  align-items: center;
  gap: 12px;
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.3s ease both;
}
.mobile-welcome-banner::after {
  content: '';
  position: absolute;
  top: -24px; right: -24px;
  width: 80px; height: 80px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
  pointer-events: none;
}
.mwb-avatar {
  width: 40px; height: 40px; flex-shrink: 0;
  border-radius: 50%;
  background: rgba(255,255,255,0.18);
  border: 1.5px solid rgba(255,255,255,0.3);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700;
  font-family: var(--font-display);
}
.mwb-info { min-width: 0; }
.mwb-name { font-family: var(--font-display); font-size: 14px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mwb-sub { font-size: 10px; color: rgba(255,255,255,0.6); margin-top: 1px; }

@media (max-width: 768px) {
  .mobile-welcome-banner { display: flex; }
  .welcome-card { display: none; }
}

/* ── Gmail Link Modal ── */
.gmail-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 3000;
  backdrop-filter: blur(6px);
  padding: 16px;
  animation: fadeIn 0.3s ease;
}

.gmail-modal {
  background: #fff;
  border-radius: 16px;
  width: 520px;
  max-width: 100%;
  overflow: hidden;
  box-shadow: 0 24px 64px rgba(0,0,0,0.25);
  animation: scaleIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.gmail-header {
  padding: 20px 24px;
  background: linear-gradient(135deg, var(--maroon) 0%, #a01010 100%);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.gmail-header-text h3 {
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  font-family: var(--font-display);
  margin: 0;
}

.gmail-header-text p {
  font-size: 11px;
  color: rgba(255,255,255,0.75);
  margin-top: 2px;
  font-weight: 400;
}

.gmail-close {
  width: 32px;
  height: 32px;
  border: none;

<script>
let studentData = null;
let allDocs = [];
let stuFile = null;
let currentFilter = 'all';
let currentView = 'documents';

// ── Init ──
async function init() {
  try {
    const meRes = await fetch('api/auth.php?action=me', { credentials: 'include' });
    const meJson = await meRes.json();
    if (!meJson.success || meJson.role !== 'student') { window.location.href = 'index.html'; return; }
    studentData = meJson;

    const res2 = await fetch('api/index.php?action=student&id=' + studentData.id, { credentials: 'include' });
    const studentJson = await res2.json();
    if (!studentJson.success) throw new Error(studentJson.message);
    studentData.grade = studentJson.student.grade;
  } catch (e) { window.location.href = 'index.html'; return; }

  try {
    const res = await fetch(`api/index.php?action=student&id=${studentData.id}`, { credentials: 'include' });
    const json = await res.json();
    if (!json.success) throw new Error(json.message);
    allDocs = json.student.docs || [];
    renderPortal(json.student);

    // Check if student has Gmail and show Gmail popup first, then survey
    const hasGmail = isGmail(studentData.email);

    if (!hasGmail) {
      // Show Gmail popup first
      setTimeout(() => showGmailLinkModal(), 800);
    } else {
      // Show survey popup if they have Gmail
      setTimeout(() => showSurveyModal(), 1500);
    }
  } catch (e) {
    document.getElementById('main-content').innerHTML = `<div class="loading-state"><div style="font-size:32px;margin-bottom:12px;">⚠️</div><div>Failed to load: ${e.message}</div></div>`;
  }
}

// ── Gmail Check Helper ──
function isGmail(email) {
  if (!email || email.trim() === '') return false;
  return email.toLowerCase().trim().endsWith('@gmail.com');
}

// ── Gmail Link Modal ──
function showGmailLinkModal() {
  const overlay = document.createElement('div');
  overlay.className = 'gmail-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  overlay.innerHTML = `
    <div class="gmail-modal">
      <div class="gmail-header">
        <div class="gmail-header-text">
          <h3>📧 Link Your Gmail Account</h3>
          <p>Required for account verification</p>
        </div>
        <button class="gmail-close" onclick="this.closest('.gmail-overlay').remove()">&times;</button>
      </div>
      <div class="gmail-body">
        <div class="gmail-icon">🎓</div>
        <div class="gmail-title">Connect Your Gmail Address</div>
        <div class="gmail-description">
          We noticed your account doesn't have a Gmail address linked. 
          Please provide your Gmail address to ensure you receive important notifications and updates about your documents.
        </div>
        <div class="gmail-input-group">
          <label for="gmail-input">Gmail Address</label>
          <input type="email" id="gmail-input" placeholder="yourname@gmail.com" autocomplete="email">
          <div class="gmail-error" id="gmail-error"></div>
        </div>
        <div class="gmail-actions">
          <button class="gmail-btn-secondary" onclick="skipGmailLink()">Skip for Now</button>
          <button class="gmail-btn-primary" id="gmail-submit-btn" onclick="submitGmailLink()">Link Gmail</button>
        </div>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);
  
  // Auto-focus the input
  setTimeout(() => {
    const input = document.getElementById('gmail-input');
    if (input) input.focus();
  }, 100);
}

async function submitGmailLink() {
  const gmailInput = document.getElementById('gmail-input');
  const errorEl = document.getElementById('gmail-error');
  const submitBtn = document.getElementById('gmail-submit-btn');
  
  if (!gmailInput || !errorEl) return;
  
  const gmail = gmailInput.value.trim();
  
  // Validation
  if (!gmail) {
    errorEl.textContent = 'Please enter your Gmail address';
    errorEl.style.display = 'block';
    return;
  }
  
  if (!gmail.toLowerCase().endsWith('@gmail.com')) {
    errorEl.textContent = 'Please enter a valid Gmail address (ending with @gmail.com)';
    errorEl.style.display = 'block';
    return;
  }
  
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(gmail)) {
    errorEl.textContent = 'Please enter a valid email address';
    errorEl.style.display = 'block';
    return;
  }
  
  // Submit
  submitBtn.disabled = true;
  submitBtn.textContent = 'Linking...';
  errorEl.style.display = 'none';
  
  try {
    const res = await fetch('api/update_gmail.php', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ gmail: gmail }),
      credentials: 'include'
    });
    
    const json = await res.json();
    
    if (!json.success) {
      throw new Error(json.message || 'Failed to update Gmail');
    }
    
    // Update local student data
    studentData.gmail = gmail;
    
    // Close modal
    document.querySelector('.gmail-overlay')?.remove();

    // Show success message
    showToast('✓ Gmail linked successfully!');

    // Now show survey
    setTimeout(() => showSurveyModal(), 1000);

  } catch (e) {
    errorEl.textContent = e.message;
    errorEl.style.display = 'block';
    submitBtn.disabled = false;
    submitBtn.textContent = 'Link Gmail';
  }
}

function skipGmailLink() {
  document.querySelector('.gmail-overlay')?.remove();

  // Show survey after skipping
  setTimeout(() => showSurveyModal(), 500);
}

// ── Survey Modal ──
function showSurveyModal() {
  const overlay = document.createElement('div');
  overlay.className = 'survey-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  
  overlay.innerHTML = `
    <div class="survey-modal">
      <div class="survey-header">
        <div class="survey-header-text">
          <h3>📝 Student Feedback Survey</h3>
          <p>Help us improve your experience</p>
        </div>
        <button class="survey-close" onclick="this.closest('.survey-overlay').remove()">&times;</button>
      </div>
      <div class="survey-body">
        <div class="survey-icon">🎓</div>
        <div class="survey-title">We Value Your Feedback!</div>
        <div class="survey-description">
          Please take a few minutes to complete our student feedback survey. 
          Your responses help us improve the AMA DigiDox system and provide better services for all students.
        </div>
        <div class="survey-actions">
          <button class="survey-btn-primary" onclick="openSurveyForm()">📋 Take Survey</button>
          <button class="survey-btn-secondary" onclick="this.closest('.survey-overlay').remove()">Later</button>
        </div>
      </div>
    </div>
  `;
  
  document.body.appendChild(overlay);
}

function openSurveyForm() {
  window.open('https://docs.google.com/forms/d/e/1FAIpQLSfHQNhC4wCpEgfk0jMmknPyrIz3-yxaWobC0RtjhlBrWveYqg/viewform', '_blank');
  document.querySelector('.survey-overlay')?.remove();
  showToast('Thank you! Survey opened in a new tab.');
}

// ── View switcher ──
function showView(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.mobile-nav-item').forEach(n => n.classList.remove('active'));

  if (view === 'documents') {
    document.querySelectorAll('.nav-item')[0]?.classList.add('active');
    document.getElementById('mnav-docs')?.classList.add('active');
    document.getElementById('topbar-title').textContent = 'My Documents';
    renderDocumentsView();
  } else {
    document.querySelectorAll('.nav-item')[1]?.classList.add('active');
    document.getElementById('mnav-overview')?.classList.add('active');
    document.getElementById('topbar-title').textContent = 'Overview';
    renderOverviewView();
  }
}

// ── renderPortal ──
function renderPortal(student) {
  const initials = studentData.name.split(' ').map(w => w[0]).join('').slice(0, 2);
  document.getElementById('sidebar-initials').textContent = initials;
  document.getElementById('sidebar-name').textContent = studentData.name;
  document.getElementById('sidebar-usn').textContent = studentData.usn;
  document.getElementById('topbar-student-info').textContent = `${studentData.usn} · ${studentData.email}`;
  window._mainDocs = allDocs.filter(d => d.doc_type !== 'Other');
  window._otherDocs = allDocs.filter(d => d.doc_type === 'Other');
  showView('documents');
}

// ── Documents View ──
function renderDocumentsView() {
  const mainDocs = window._mainDocs || [];
  const otherDocs = window._otherDocs || [];
  const allDone = mainDocs.filter(d => d.status === 'uploaded').length;
  const reviewing = mainDocs.filter(d => d.status === 'reviewing').length;
  const missingCount = mainDocs.filter(d => d.status === 'missing' || d.status === 'expired').length;
  const otherCount = otherDocs.filter(d => d.status === 'uploaded' || d.status === 'reviewing').length;
  const reqMain = mainDocs.filter(d => d.is_required);
  const totalRequired = reqMain.length;
  const uploadedRequired = reqMain.filter(d => d.status === 'uploaded').length;
  const pct = totalRequired > 0 ? Math.round(uploadedRequired / totalRequired * 100) : 0;
  const initials = studentData.name.split(' ').map(w => w[0]).join('').slice(0, 2);

  const initials2 = studentData.name.split(' ').map(w => w[0]).join('').slice(0, 2);

  document.getElementById('main-content').innerHTML = `
    <div class="mobile-welcome-banner">
      <div class="mwb-avatar">${initials2}</div>
      <div class="mwb-info">
        <div class="mwb-name">Welcome, ${studentData.name.split(' ')[0]}!</div>
        <div class="mwb-sub">USN: ${studentData.usn} · ${studentData.email}</div>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-card" style="animation-delay:0.05s">
        <div class="stat-icon-wrap total">📋</div>
        <div>
          <div class="stat-value total">${mainDocs.length}</div>
          <div class="stat-label">Total Docs</div>
        </div>
      </div>
      <div class="stat-card" style="animation-delay:0.1s">
        <div class="stat-icon-wrap uploaded">✅</div>
        <div>
          <div class="stat-value uploaded">${allDone}</div>
          <div class="stat-label">Uploaded</div>
        </div>
      </div>
      <div class="stat-card" style="animation-delay:0.15s">
        <div class="stat-icon-wrap reviewing">🔍</div>
        <div>
          <div class="stat-value reviewing">${reviewing}</div>
          <div class="stat-label">Under Review</div>
        </div>
      </div>
      <div class="stat-card" style="animation-delay:0.2s">
        <div class="stat-icon-wrap missing">⚠️</div>
        <div>
          <div class="stat-value missing">${missingCount}</div>
          <div class="stat-label">Missing</div>
        </div>
      </div>
    </div>

    <div class="content-grid">
      <!-- Left: Doc list -->
      <div>
        <div class="card" style="animation-delay:0.25s">
          <div class="card-header">
            <div class="card-title">Documents</div>
            <div class="card-header-actions">
              <button class="btn btn-primary" style="padding:6px 14px;font-size:11px;" onclick="openStudentUploadModal()">+ Upload</button>
            </div>
          </div>
          <div class="filter-row">
            <button class="filter-btn active" data-filter="all" onclick="filterDocs('all')">All (${mainDocs.length})</button>
            <button class="filter-btn" data-filter="uploaded" onclick="filterDocs('uploaded')">Uploaded (${allDone})</button>
            <button class="filter-btn" data-filter="reviewing" onclick="filterDocs('reviewing')">Under Review (${reviewing})</button>
            <button class="filter-btn" data-filter="missing" onclick="filterDocs('missing')">Missing (${missingCount})</button>
          </div>
          <div class="doc-list" id="portal-doc-list"></div>
          ${otherCount > 0 ? `
          <div class="section-label">Other Documents <span class="count-badge">${otherCount}/3</span></div>
          <div class="doc-list" id="portal-other-list"></div>
          ` : `<div id="portal-other-list" style="display:none"></div>`}
        </div>
      </div>

      <!-- Right panel -->
      <div class="right-panel">
        <!-- Welcome card -->
        <div class="welcome-card" style="animation-delay:0.3s">
          <div class="welcome-avatar">${initials}</div>
          <div class="welcome-name">Welcome, ${studentData.name.split(' ')[0]}!</div>
          <div class="welcome-sub" style="margin-top:2px;">USN: ${studentData.usn}</div>
          <div class="welcome-sub">${studentData.email}</div>
        </div>

        <!-- Progress -->
        <div class="card" style="animation-delay:0.35s">
          <div class="card-header">
            <div class="card-title">Completion</div>
            <span style="font-size:13px;font-weight:700;color:var(--maroon);">${pct}%</span>
          </div>

function filterDocs(status) {

// ── Render Doc List ──
function renderDocs() {
  const container = document.getElementById('portal-doc-list');
  if (!container) return;
  const mainDocs = window._mainDocs || [];
  let docs = mainDocs;
  if (currentFilter === 'uploaded') docs = mainDocs.filter(d => d.status === 'uploaded');
  else if (currentFilter === 'reviewing') docs = mainDocs.filter(d => d.status === 'reviewing');
  else if (currentFilter === 'missing') docs = mainDocs.filter(d => d.status === 'missing' || d.status === 'expired');

  const extIcons = { Identity: '🪪', Academic: '📚', Health: '🏥', Residential: '🏠', Personal: '🖼' };

  if (!docs.length) {
    container.innerHTML = `<div class="empty-state"><div class="es-icon">📋</div><div class="es-text">No documents match this filter.</div></div>`;
    return;
  }

  container.innerHTML = docs.map(d => {
    const icon = extIcons[d.doc_type] || '📄';
    const needsUpload = (d.status === 'missing' || d.status === 'expired');
    const displayName = d.custom_name || d.name;
    const nameDisplay = d.custom_name
      ? `${d.name}: <span style="color:var(--maroon);font-weight:600;">${d.custom_name}</span>`
      : displayName;
    const viewBtn = (d.status === 'uploaded' || d.status === 'reviewing') && d.file_path
      ? `<button class="mini-btn" onclick="viewDoc(${d.id},'${d.name.replace(/'/g,"\\'")}')">👁 View</button>` : '';
    const uploadBtn = needsUpload
      ? `<button class="mini-btn" onclick="uploadDoc(${d.id},'${d.name.replace(/'/g,"\\'")}')">Upload</button>` : '';
    const deleteBtn = (d.status === 'uploaded' || d.status === 'reviewing')
      ? `<button class="mini-btn danger" style="color:var(--red);" onclick="deleteStudentDoc(${d.id},'${d.name.replace(/'/g,"\\'")}')">🗑</button>` : '';
    const actions = [viewBtn, uploadBtn, deleteBtn].filter(Boolean).join('');
    return `<div class="doc-item">
      <div class="doc-icon">${icon}</div>
      <div class="doc-name">${nameDisplay}${d.is_required ? ' <span style="color:var(--red);font-size:8px;font-weight:700;">● REQ</span>' : ''}</div>
      <span class="doc-badge ${d.status}">${d.status.charAt(0).toUpperCase() + d.status.slice(1)}</span>
      ${actions ? `<div class="doc-actions">${actions}</div>` : ''}
    </div>`;
  }).join('');
}

// ── Render Other Docs ──
function renderOtherDocs() {
  const container = document.getElementById('portal-other-list');
  if (!container) return;
  const otherDocs = window._otherDocs || [];

async function deleteStudentDoc(docId, docName) {
  if (!confirm(`Delete "${docName}"? This cannot be undone.`)) return;
  try {

    if (!json.success) throw new Error(json.message);
    showToast('Document deleted');

  } catch (e) { showToast('Delete failed: ' + e.message); }

function onUploadTypeChange() {
  const sel = document.getElementById('stu-upload-type');
  const grp = document.getElementById('stu-other-name-group');
  if (grp) grp.style.display = sel.value === '__other__' ? 'block' : 'none';
}

function stuSelect(f, ov) {
  const ok = ['application/pdf','image/jpeg','image/png','image/jpg'];
  if (!ok.includes(f.type) && !f.name.match(/\.(pdf|jpg|jpeg|png)$/i)) { const e = ov.querySelector('#stu-err'); e.textContent = 'Only PDF, JPG, PNG accepted.'; e.style.display = 'block'; return; }
  if (f.size > 10*1024*1024) { const e = ov.querySelector('#stu-err'); e.textContent = 'File too large — max 10 MB.'; e.style.display = 'block'; return; }
  stuFile = f;
  const info = ov.querySelector('#stu-info'); info.style.display = 'block';
  info.innerHTML = `✅ <strong>${f.name}</strong> <span style="color:#999;">(${(f.size/1024).toFixed(1)} KB)</span>`;
  ov.querySelector('#stu-btn').disabled = false; ov.querySelector('#stu-err').style.display = 'none';
}

async function stuUpload() {
  if (!stuFile) return;
  const type = document.getElementById('stu-upload-type').value;
  if (!type) { showToast('Select a document type'); return; }

  const btn = document.getElementById('stu-btn'), prog = document.getElementById('stu-progress'), bar = document.getElementById('stu-bar');
  btn.disabled = true; btn.textContent = 'Uploading…'; prog.style.display = 'block';

  try {
    const stype = (studentData.grade === 'Grade 11' || studentData.grade === 'Grade 12') ? 'shs' : 'college';
    let docDefId = null, slotId = null, customName = null;
    const sel = document.getElementById('stu-upload-type');
    const opt = sel.options[sel.selectedIndex];

    if (type === '__other__') {
      customName = document.getElementById('stu-custom-name').value.trim();
      if (!customName) { showToast('Enter a document name'); btn.disabled = false; btn.textContent = 'Upload'; return; }
      slotId = opt ? opt.dataset.slotId : null;
    } else {
      const defsRes = await fetch('api/index.php?action=doc_definitions&student_type=' + stype);
      const defsJson = await defsRes.json();
      const def = defsJson.definitions.find(d => d.name === type);
      if (!def) throw new Error('Document type not found');
      docDefId = def.id;
    }

    const fd = new FormData();
    fd.append('file', stuFile);
    fd.append('student_id', studentData.id);
    if (docDefId) fd.append('doc_def_id', docDefId);
    if (slotId) fd.append('slot_id', slotId);
    fd.append('status', 'reviewing');
    fd.append('uploaded_date', new Date().toLocaleDateString('en-US', {month:'short',day:'numeric'}));
    fd.append('file_size', stuFile.size < 1024*1024 ? (stuFile.size/1024).toFixed(1)+' KB' : (stuFile.size/(1024*1024)).toFixed(1)+' MB');
    if (customName) fd.append('custom_name', customName);

    const xhr = new XMLHttpRequest();
    xhr.open('POST', 'api/upload.php');
    xhr.upload.onprogress = (e) => { if (e.lengthComputable) bar.style.width = Math.round(e.loaded/e.total*100)+'%'; };
    const result = await new Promise((ok, fail) => {
      xhr.onload = () => { try { ok(JSON.parse(xhr.responseText)); } catch { fail(new Error('Invalid response')); } };
      xhr.onerror = () => fail(new Error('Network error'));
      xhr.send(fd);
    });
    if (!result.success) throw new Error(result.message);
    showToast('Uploaded! Document is now under review.');
    document.querySelector('#stu-btn')?.closest('div')?.parentElement?.parentElement?.remove();
    await init();
  } catch (e) {
    const el = document.getElementById('stu-err'); el.textContent = 'Upload failed: '+e.message; el.style.display = 'block';
  } finally { const btn = document.getElementById('stu-btn'); if(btn){btn.disabled = false; btn.textContent = 'Upload';} }
}

    const oldPw = document.getElementById('cpw-old').value;
    const newPw = document.getElementById('cpw-new').value;
    const confirmPw = document.getElementById('cpw-confirm').value;
    const errEl = document.getElementById('cpw-err');
    if (!oldPw || !newPw || !confirmPw) { errEl.textContent = 'All fields are required'; errEl.style.display = 'block'; return; }
    if (newPw.length < 6) { errEl.textContent = 'New password must be at least 6 characters'; errEl.style.display = 'block'; return; }
    if (newPw !== confirmPw) { errEl.textContent = 'New passwords do not match'; errEl.style.display = 'block'; return; }
    btn.disabled = true; btn.textContent = 'Sending…';
    try {
      const res = await fetch('api/auth.php?action=change_password', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({old_password:oldPw,new_password:newPw,confirm_password:confirmPw}) });
      const json = await res.json();
      if (!json.success) throw new Error(json.message);
      document.getElementById('cpw-step1').style.display = 'none';
      document.getElementById('cpw-step2').style.display = 'block';
      document.getElementById('cpw-title').textContent = 'Enter Verification Code';
      btn.textContent = 'Verify & Change'; btn.disabled = false;
    } catch (e) { errEl.textContent = e.message; errEl.style.display = 'block'; btn.disabled = false; btn.textContent = 'Send Code'; }
  } else {
    const code = document.getElementById('cpw-code').value.trim();
    const errEl = document.getElementById('cpw-err2');
    if (!code || code.length !== 6) { errEl.textContent = 'Enter a valid 6-digit code'; errEl.style.display = 'block'; return; }
    btn.disabled = true; btn.textContent = 'Verifying…';
    try {
      const res = await fetch('api/auth.php?action=change_password_verify', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({code}) });
      const json = await res.json();
      if (!json.success) throw new Error(json.message);
      showToast('Password changed successfully!');
      document.getElementById('change-pw-overlay').remove();
    } catch (e) { errEl.textContent = e.message; errEl.style.display = 'block'; btn.disabled = false; btn.textContent = 'Verify & Change'; }
  }
}

init();
</script>
</body>
</html>
